version: "3.9"

x-app-defaults: &app-defaults
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  volumes:
    - uploads:/app/uploads
    - output:/app/output
    - logs:/app/logs
  restart: unless-stopped
  networks:
    - backend

services:
  app:
    <<: *app-defaults
    container_name: pdftoword_api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery_worker:
    <<: *app-defaults
    container_name: pdftoword_celery
    ports: []
    command: celery -A app.worker.queue.celery_app worker --loglevel=info --concurrency=4 --queues=conversions,maintenance,notifications
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_started

  celery_beat:
    <<: *app-defaults
    container_name: pdftoword_celery_beat
    ports: []
    command: celery -A app.worker.queue.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_started

  flower:
    <<: *app-defaults
    container_name: pdftoword_flower
    ports:
      - "5555:5555"
    command: celery -A app.worker.queue.celery_app flower --port=5555 --basic-auth=admin:admin
    depends_on:
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: pdftoword_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: pdftoword
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pdftoword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: pdftoword_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  nginx:
    image: nginx:1.26-alpine
    container_name: pdftoword_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads:
  output:
  logs:
